spring.application.name=neon-java-jdbc

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.web.error.include-stacktrace=never
spring.web.error.include-message=never

app.security.jwt.secret=${JWT_SECRET:change-this-secret-with-at-least-32-characters}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

spring.mvc.pathmatch.matching-strategy=ant_path_matcher
